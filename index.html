<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KvK Insert Trainer</title>

<style>

body{
    background:#111827;
    color:white;
    font-family:sans-serif;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

.card{
    background:#1f2937;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

h1,h2{
    text-align:center;
}

.big-text{
    text-align:center;
    font-size:64px;
    font-weight:bold;
    margin:30px 0;
    font-family:monospace;
}

.result{
    background:#0f172a;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
    font-family:monospace;
    text-align:center;
    font-size:22px;
}

.stats{
    margin-top:20px;
    line-height:1.8;
    font-size:18px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:20px;
    cursor:pointer;
    margin-top:10px;
}

.good{
    color:#22c55e;
}

.mid{
    color:#facc15;
}

.bad{
    color:#ef4444;
}

.mode-btn{
    background:#374151;
}

.active-mode{
    background:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<h1>KvK 差し込み練習</h1>

<div class="card">

<h2>モード選択</h2>

<button id="randomBtn"
class="mode-btn active-mode"
onclick="setMode('random')">
ランダムGO
</button>

<button id="countBtn"
class="mode-btn"
onclick="setMode('countdown')">
3・2・1・GO
</button>

</div>

<div class="card">

<button onclick="startTrainer()">
START
</button>

<div id="goText" class="big-text">
READY
</div>

<button onclick="tapNow()">
TAP
</button>

<div id="tapResult" class="result">
結果待ち
</div>

<div class="stats">

<div>
平均:
<span id="avgText">0.000</span>
</div>

<div>
BEST:
<span id="bestText">0.000</span>
</div>

<div>
回数:
<span id="countText">0</span>
</div>

</div>

</div>

</div>

<script>

let targetTime = 0;
let started = false;
let mode = "random";

let results = [];
let best = null;

function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate(80);
    }
}

function setMode(newMode){

    mode = newMode;

    document.getElementById("randomBtn")
        .classList.remove("active-mode");

    document.getElementById("countBtn")
        .classList.remove("active-mode");

    if(mode === "random"){
        document.getElementById("randomBtn")
            .classList.add("active-mode");
    }else{
        document.getElementById("countBtn")
            .classList.add("active-mode");
    }
}

function startTrainer(){

    started = false;

    document.getElementById("tapResult").innerHTML =
        "待機中";

    if(mode === "random"){
        randomMode();
    }else{
        countdownMode();
    }
}

function randomMode(){

    document.getElementById("goText").innerText =
        "READY";

    const wait =
        2000 + Math.random() * 3000;

    setTimeout(() => {

        showGo();

    }, wait);
}

function countdownMode(){

    let count = 3;

    document.getElementById("goText").innerText =
        count;

    const interval = setInterval(() => {

        count--;

        if(count > 0){

            document.getElementById("goText").innerText =
                count;

        }else{

            clearInterval(interval);

            showGo();
        }

    },1000);
}

function showGo(){

    targetTime = performance.now();

    started = true;

    document.getElementById("goText").innerText =
        "GO!";

    vibrate();
}

function tapNow(){

    if(!started){

        document.getElementById("tapResult").innerHTML =
            `<span class="bad">GO前に押した</span>`;

        return;
    }

    const tapTime =
        performance.now();

    const diff =
        (tapTime - targetTime) / 1000;

    const abs =
        Math.abs(diff);

    let className = "";
    let rank = "";

    if(abs <= 0.05){

        className = "good";
        rank = "PERFECT";

    }else if(abs <= 0.10){

        className = "mid";
        rank = "GOOD";

    }else{

        className = "bad";
        rank = "MISS";
    }

    let text = "";

    if(diff >= 0){

        text =
            `+${diff.toFixed(3)} 秒`;

    }else{

        text =
            `${diff.toFixed(3)} 秒`;
    }

    document.getElementById("tapResult").innerHTML =
        `<span class="${className}">
            ${rank}<br>${text}
        </span>`;

    results.push(abs);

    if(best === null || abs < best){
        best = abs;
    }

    updateStats();

    started = false;

    setTimeout(() => {

        document.getElementById("goText").innerText =
            "READY";

    },500);
}

function updateStats(){

    let total = 0;

    for(let r of results){
        total += r;
    }

    const avg =
        total / results.length;

    document.getElementById("avgText").innerText =
        avg.toFixed(3) + " 秒";

    document.getElementById("bestText").innerText =
        best.toFixed(3) + " 秒";

    document.getElementById("countText").innerText =
        results.length;
}

</script>

</body>
</html>
